name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch binary tools from upstream linuxdeploy
        run: |
          git clone --depth=1 --filter=blob:none --sparse \
            https://github.com/meefik/linuxdeploy.git _upstream
          cd _upstream
          git sparse-checkout set app/src/main/assets/bin
          git checkout
          cd ..
          for arch in arm arm_64 x86 x86_64; do
            cp -r _upstream/app/src/main/assets/bin/${arch} app/src/main/assets/bin/
          done
          rm -rf _upstream

      - name: Set up JDK 17 (for sdkmanager)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-29 build-tools;29.0.2'

      - name: Set up JDK 11 (for Gradle build)
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        with:
          tag_name: pre-${{ github.run_number }}
          name: Pre-release #${{ github.run_number }}
          prerelease: true
          generate_release_notes: true
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
